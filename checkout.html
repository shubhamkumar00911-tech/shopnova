<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | ShopNova</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .checkout-layout {
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 1rem;
    }
    
    /* Progress Bar */
    .progress-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3rem;
      position: relative;
    }
    .progress-bar::before {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 2px; background: var(--color-border);
      z-index: -1; transform: translateY(-50%);
    }
    .step-indicator {
      background: var(--color-surface);
      border: 2px solid var(--color-border);
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; color: var(--color-text-muted);
      transition: all var(--transition-fast);
    }
    .step-indicator.active {
      border-color: var(--color-primary);
      background: var(--color-primary);
      color: white;
    }
    
    /* Steps */
    .checkout-step {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 2rem;
      box-shadow: var(--shadow-sm);
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .full-width { grid-column: 1 / -1; }

    /* Payment Methods */
    .payment-method {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 1rem;
      margin-bottom: 1rem;
      cursor: pointer;
      display: flex; flex-direction: column;
    }
    .payment-method:hover { border-color: var(--color-primary-light); }
    .payment-method-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .payment-details {
      margin-top: 1rem; padding-top: 1rem;
      border-top: 1px dashed var(--color-border);
      display: none;
    }
    .badge-recommended {
      background: var(--color-success); color: white;
      font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: var(--radius-full);
    }
    
    /* Order Review */
    .review-box {
      background: var(--color-bg); padding: 1.5rem; border-radius: var(--radius-sm);
      margin-bottom: 1.5rem;
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
  <!-- Canvas Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container navbar__container">
      <a href="index.html" class="navbar__logo">ShopNova</a>
      <div class="navbar__actions">
        <span class="text-muted">Secure Checkout 🔒</span>
      </div>
    </div>
  </nav>

  <main class="checkout-layout">
    
    <div class="progress-bar">
      <div class="step-indicator step-btn active">1</div>
      <div class="step-indicator step-btn">2</div>
      <div class="step-indicator step-btn">3</div>
    </div>

    <!-- STEP 1: Delivery Address -->
    <div id="step-1" class="checkout-step reveal active">
      <h2 class="mb-4">Delivery Address</h2>
      <form id="address-form">
        <div class="form-grid">
          <div class="form-group full-width">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-input" required pattern="[0-9]{10}">
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" required>
          </div>
          <div class="form-group full-width">
            <label class="form-label">Address Line 1</label>
            <input type="text" class="form-input" required>
          </div>
          <div class="form-group full-width">
            <label class="form-label">Address Line 2 (Optional)</label>
            <input type="text" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">City</label>
            <input type="text" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">State</label>
            <select class="form-input" required>
              <option value="">Select State</option>
              <option value="MH">Maharashtra</option>
              <option value="DL">Delhi</option>
              <option value="KA">Karnataka</option>
              <option value="TN">Tamil Nadu</option>
              <option value="GJ">Gujarat</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Pincode</label>
            <input type="text" class="form-input" required pattern="[0-9]{6}">
          </div>
        </div>
        <button type="submit" class="btn btn--primary mt-4">Continue to Payment</button>
      </form>
    </div>

    <!-- STEP 2: Payment Method -->
    <div id="step-2" class="checkout-step" style="display: none;">
      <h2 class="mb-4">Payment Method</h2>
      <form id="payment-form">
        
        <label class="payment-method">
          <div class="payment-method-header">
            <div>
              <input type="radio" name="payment" value="cod" checked>
              <span class="fw-semibold ml-2">Cash on Delivery</span>
            </div>
            <span class="badge-recommended">Recommended</span>
          </div>
          <div id="details-cod" class="payment-details" style="display: block;">
            <p class="text-muted">Pay with cash when your order is delivered.</p>
          </div>
        </label>

        <label class="payment-method">
          <div class="payment-method-header">
            <div>
              <input type="radio" name="payment" value="upi">
              <span class="fw-semibold ml-2">UPI (GPay, PhonePe, Paytm)</span>
            </div>
          </div>
          <div id="details-upi" class="payment-details">
            <div class="text-center">
              <img src="https://picsum.photos/seed/qr/150/150" alt="UPI QR Code" style="margin: 0 auto 1rem;">
              <p class="text-muted">Scan the QR code to pay using any UPI app.</p>
            </div>
          </div>
        </label>

        <label class="payment-method">
          <div class="payment-method-header">
            <div>
              <input type="radio" name="payment" value="card">
              <span class="fw-semibold ml-2">Credit / Debit Card</span>
            </div>
          </div>
          <div id="details-card" class="payment-details">
            <div class="form-group">
              <label class="form-label">Card Number</label>
              <input type="text" class="form-input" placeholder="0000 0000 0000 0000">
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Expiry (MM/YY)</label>
                <input type="text" class="form-input" placeholder="MM/YY">
              </div>
              <div class="form-group">
                <label class="form-label">CVV</label>
                <input type="text" class="form-input" placeholder="123">
              </div>
            </div>
          </div>
        </label>

        <div class="d-flex gap-2 mt-4">
          <button type="button" class="btn btn--outline" onclick="goToStep(0)">Back</button>
          <button type="submit" class="btn btn--primary">Review Order</button>
        </div>
      </form>
    </div>

    <!-- STEP 3: Order Review -->
    <div id="step-3" class="checkout-step" style="display: none;">
      <h2 class="mb-4">Review Your Order</h2>
      
      <div class="review-box">
        <h4 class="mb-2">Order Items</h4>
        <div id="review-items"></div>
      </div>

      <div class="review-box">
        <div class="d-flex justify-between items-center">
          <h3 class="mb-0">Grand Total</h3>
          <h2 id="review-total" class="text-primary mb-0">₹0</h2>
        </div>
      </div>

      <div class="d-flex gap-2 mt-4">
        <button type="button" class="btn btn--outline" onclick="goToStep(1)">Back</button>
        <button id="place-order-btn" type="button" class="btn btn--primary" style="flex-grow: 1;">Place Order</button>
      </div>
    </div>

  </main>

  <script src="main.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
